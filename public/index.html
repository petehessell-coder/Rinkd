<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0B1F3A" />
    <meta name="description" content="Rinkd — The Platform Built for Hockey. All ages. Real players. One community." />
    <title>Rinkd</title>
    <link rel="manifest" href="/manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:ital,wght@0,400;0,600;0,700;0,800;0,900;1,700;1,800;1,900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet" />
    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; min-height: 100vh; }
      body {
        background: #030C15;
        color: #F4F7FA;
        font-family: 'Barlow', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0B1F3A; }
      ::-webkit-scrollbar-thumb { background: #2E5B8C; border-radius: 3px; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; }
      a { text-decoration: none; color: inherit; }
      input, textarea, select { font-family: inherit; }
    </style>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
