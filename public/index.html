    <style>
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html, body, #root { height: 100%; min-height: 100vh; }
      body {
        /* Rink navy — matches theme-color, the iOS splash, and the app's first
           paint so a cold launch is one seamless navy (no white/black flash)
           and iOS overscroll rubber-bands on-brand. */
        background: #0B1F3A;
        color: #F4F7FA;
        font-family: 'Barlow', sans-serif;
        -webkit-font-smoothing: antialiased;
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #0B1F3A; }
      ::-webkit-scrollbar-thumb { background: #2E5B8C; border-radius: 3px; }
      button { font-family: inherit; cursor: pointer; border: none; background: none; }
      a { text-decoration: none; color: inherit; }
      input, textarea, select { font-family: inherit; }
      /* a11y: a visible KEYBOARD focus ring on every interactive control. The app
         strips native outlines (button{border:none} + inline outline:none all over),
         so keyboard/switch users currently get no focus indicator anywhere. This
         restores one for :focus-visible only — mouse/touch taps get NO ring, so
         zero visual change on the common path. !important beats the inline
         outline:none many controls set. */
      :focus-visible { outline: 2px solid #5B9FE2 !important; outline-offset: 2px; border-radius: 4px; }
      :focus:not(:focus-visible) { outline: none; }
    </style>
